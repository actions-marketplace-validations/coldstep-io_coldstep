<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Coldstep detect-mode report</title>
  <style>{{ STYLES }}</style>
</head>
<body>
  <header class="report-header">
    <h1>Coldstep detect-mode report</h1>
    <p class="meta">Generated <time>{{ GENERATED_AT }}</time></p>
  </header>

  <main>
    <section id="capabilities">
      <h2>Detect Capability Matrix</h2>
      <div data-mount="capabilities"></div>
    </section>

    <section id="events">
      <h2>Events by type</h2>
      <div data-mount="events"></div>
    </section>

    <section id="egress">
      <h2>Egress flow (host &rarr; policy)</h2>
      <div data-mount="egress"></div>
    </section>

    <section id="diff">
      <h2>Previous-run diff</h2>
      <div data-mount="diff"></div>
    </section>
  </main>

  <!--
    Inline report-model JSON. Lives in a <script type="application/json"> island
    (raw-text element, not parsed as HTML). The Python renderer defangs any
    literal `</` in the payload so this tag can't be terminated early.
  -->
  <script id="coldstep-report-model" type="application/json">{{ MODEL_JSON }}</script>

  <!--
    Vendor scripts loaded with Subresource Integrity. URLs MUST stay pinned to
    an exact semver (jsDelivr explicitly forbids SRI on version-range aliases
    like @7 or @0.6 - the CDN may regenerate those bytes on storage failover).
    To bump: change the version in the URL, refetch the bytes, recompute sha384
    with `Invoke-WebRequest | ... ComputeHash`, replace the integrity value.
  -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"
          integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6.17/dist/plot.umd.min.js"
          integrity="sha384-JUpn2GgRr0gxU0xOBd8D8P634jhRCwobtG8G2MMEkX1RnGJ7/FJNnuukpfT+H2w1"
          crossorigin="anonymous"></script>

  <script type="module">
    const model = JSON.parse(document.getElementById("coldstep-report-model").textContent);
    const $ = (sel) => document.querySelector(sel);

    // 1. Capability matrix as a small table.
    // Built via createElement + textContent so adding any future user-derived
    // field (CLI label, observed traffic string, error text) cannot smuggle
    // HTML or script tags. The status string is constrained via classList.add
    // (whitespace would throw). Closes CodeQL js/xss-through-dom on this mount.
    {
      const mount = $('[data-mount="capabilities"]');
      mount.replaceChildren();
      const table = document.createElement("table");
      table.className = "cap";
      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      for (const h of ["Capability", "Status", "Evidence"]) {
        const th = document.createElement("th");
        th.textContent = h;
        headerRow.appendChild(th);
      }
      thead.appendChild(headerRow);
      table.appendChild(thead);
      const tbody = document.createElement("tbody");
      for (const r of model.capability_matrix) {
        const tr = document.createElement("tr");
        const tdLabel = document.createElement("td");
        tdLabel.textContent = r.label;
        const tdStatus = document.createElement("td");
        tdStatus.classList.add("status");
        if (typeof r.status === "string" && /^[a-z0-9_-]+$/i.test(r.status)) {
          tdStatus.classList.add(r.status);
        }
        tdStatus.textContent = r.status;
        const tdCount = document.createElement("td");
        tdCount.textContent = String(r.evidence_count);
        tr.appendChild(tdLabel);
        tr.appendChild(tdStatus);
        tr.appendChild(tdCount);
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      mount.appendChild(table);
    }

    // 2. Events bar chart (Observable Plot).
    if (window.Plot) {
      $('[data-mount="events"]').appendChild(
        Plot.plot({
          marginLeft: 80,
          x: { label: "Count" },
          y: { label: null },
          marks: [
            Plot.barX(model.events_by_type, { y: "type", x: "count", sort: { y: "x", reverse: true } }),
            Plot.ruleX([0]),
          ],
        })
      );
    }

    // 3. Egress: Plot ships no sankey mark in 0.6, so render host -> policy
    //    as a stacked bar grouped by source, coloured by target.
    if (window.Plot) {
      $('[data-mount="egress"]').appendChild(
        Plot.plot({
          marginLeft: 140,
          x: { label: "Events" },
          color: { legend: true },
          marks: [
            Plot.barX(model.egress_sankey, {
              y: "source",
              x: "value",
              fill: "target",
              sort: { y: "x", reverse: true },
            }),
          ],
        })
      );
    }

    // 4. Diff: small tables, one per bucket.
    // r.fingerprint is the canonical "traffic » <type> » <dst> » <dport> » <fqdn> » ..."
    // string built from observed network egress — IS user-derived. Every insert
    // below routes through textContent (or an attribute set via property) so
    // embedded HTML/script bytes are neutralised. Closes CodeQL js/xss-through-dom.
    {
      const mount = $('[data-mount="diff"]');
      mount.replaceChildren();
      const sec = (label, rows) => {
        if (!rows || !rows.length) {
          const p = document.createElement("p");
          p.className = "empty";
          p.append(`${label}: `);
          const em = document.createElement("em");
          em.textContent = "none";
          p.appendChild(em);
          return [p];
        }
        const heading = document.createElement("h3");
        heading.textContent = label;
        const table = document.createElement("table");
        table.className = "diff";
        const tbody = document.createElement("tbody");
        for (const r of rows) {
          if (!r.fingerprint) continue;
          const tr = document.createElement("tr");
          const tdCount = document.createElement("td");
          tdCount.textContent = String(r.count ?? r.current ?? "");
          const tdFp = document.createElement("td");
          const code = document.createElement("code");
          code.textContent = r.fingerprint;
          tdFp.appendChild(code);
          tr.appendChild(tdCount);
          tr.appendChild(tdFp);
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        return [heading, table];
      };
      const d = model.diff;
      if (d.status === "ok") {
        for (const node of [
          ...sec("New traffic", d.traffic_new),
          ...sec("Missing traffic", d.traffic_gone),
          ...sec("Changed multiplicity", d.traffic_changed),
        ]) mount.appendChild(node);
      } else {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = `Diff unavailable: ${d.reason || "unknown"}`;
        mount.appendChild(p);
      }
    }
  </script>
</body>
</html>
